<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; font-family: "Source Sans Pro", system-ui, sans-serif; }
  .wrap { padding: 2px 4px 8px 4px; }
  .row { display: flex; align-items: center; gap: 12px; }

  /* The slider area holds a drawn track + tick overlay + a transparent native range. */
  .slider { position: relative; flex: 1; height: 30px; }
  .track {
    position: absolute; left: 12px; right: 12px; top: 50%; transform: translateY(-50%);
    height: 8px; border-radius: 6px; background: #e6e6e6;
  }
  .tick {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 2px; height: 18px; background: #5b6b86; opacity: .6; pointer-events: none;
  }

  input[type=range] {
    position: absolute; left: 0; top: 0; width: 100%; height: 30px; margin: 0;
    background: transparent; -webkit-appearance: none; appearance: none; cursor: pointer;
  }
  input[type=range]:focus { outline: none; }
  input[type=range]::-webkit-slider-runnable-track { height: 30px; background: transparent; }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; margin-top: 3px;
    width: 24px; height: 24px; border-radius: 50%; background: #d9534f;
    border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.35); cursor: grab; position: relative; z-index: 3;
  }
  input[type=range]:active::-webkit-slider-thumb { cursor: grabbing; transform: scale(1.06); }
  input[type=range]::-moz-range-track { height: 30px; background: transparent; }
  input[type=range]::-moz-range-thumb {
    width: 24px; height: 24px; border-radius: 50%; background: #d9534f;
    border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.35); cursor: grab;
  }

  .time {
    font-size: 1.35rem; font-weight: 700; color: #d9534f;
    min-width: 108px; text-align: right; font-variant-numeric: tabular-nums;
  }
  .ticks-row { display: flex; justify-content: space-between; font-size: .7rem; color: #888; margin: 2px 120px 0 12px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="slider">
        <div class="track"></div>
        <div id="ticks"></div>
        <input type="range" id="r" min="0" max="1439" step="5" value="720" />
      </div>
      <div class="time" id="lbl">12:00 PM</div>
    </div>
    <div class="ticks-row"><span>12a</span><span>6a</span><span>12p</span><span>6p</span><span>12a</span></div>
  </div>

<script>
const SEND_THROTTLE_MS = 120;   // stream updates this often while dragging

function post(msg){ window.parent.postMessage(Object.assign({isStreamlitMessage:true}, msg), "*"); }
function setValue(v){ post({type:"streamlit:setComponentValue", value:v, dataType:"json"}); }
function setHeight(h){ post({type:"streamlit:setFrameHeight", height:h}); }

const r = document.getElementById("r");
const lbl = document.getElementById("lbl");
const ticksBox = document.getElementById("ticks");
let inited = false, lastSent = 0;

function fmt(m){
  m = ((m % 1440) + 1440) % 1440;
  let h = Math.floor(m/60), mm = m % 60;
  let ap = h < 12 ? "AM" : "PM";
  let hh = h % 12; if (hh === 0) hh = 12;
  return hh + ":" + String(mm).padStart(2,"0") + " " + ap;
}
function updateLabel(){ lbl.textContent = fmt(+r.value); }

// Draw vertical tick marks at the given minutes, aligned to the thumb's travel
// (track is inset 12px = half the 24px thumb on each side).
function drawTicks(arr, lo, hi){
  ticksBox.innerHTML = "";
  const span = (hi - lo) || 1;
  (arr || []).forEach(function(m){
    const fr = Math.max(0, Math.min(1, (m - lo) / span));
    const d = document.createElement("div");
    d.className = "tick";
    d.style.left = "calc(" + (12 - fr*24).toFixed(2) + "px + " + (fr*100).toFixed(3) + "%)";
    ticksBox.appendChild(d);
  });
}

r.addEventListener("input", function(){
  updateLabel();
  const now = Date.now();
  if (now - lastSent >= SEND_THROTTLE_MS){ lastSent = now; setValue(+r.value); }
});
r.addEventListener("change", function(){ setValue(+r.value); });

window.addEventListener("message", function(e){
  if (!e.data || e.data.type !== "streamlit:render") return;
  const args = e.data.args || {};
  if (args.min != null) r.min = args.min;
  if (args.max != null) r.max = args.max;
  if (args.step != null) r.step = args.step;
  if (!inited){
    if (args.value != null) r.value = args.value;
    updateLabel();
    inited = true;
    setValue(+r.value);
  }
  drawTicks(args.ticks, +r.min, +r.max);   // refresh each render (date can change them)
  setHeight(72);
});

post({type:"streamlit:componentReady", apiVersion:1});
setHeight(72);
</script>
</body>
</html>
